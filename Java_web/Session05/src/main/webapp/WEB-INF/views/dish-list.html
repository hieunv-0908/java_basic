<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách món ăn</title>
</head>
<body>

<h2>Danh sách món ăn</h2>

<!-- Kiểm tra danh sách rỗng -->
<div th:if="${dishes == null or #lists.isEmpty(dishes)}">
    <p>Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau</p>
</div>

<!-- Hiển thị bảng nếu có dữ liệu -->
<table border="1" th:unless="${dishes == null or #lists.isEmpty(dishes)}">
    <tr>
        <th>ID</th>
        <th>Tên món</th>
        <th>Giá</th>
        <th>Trạng thái</th>
    </tr>

    <tr th:each="dish : ${dishes}">
        <td th:text="${dish.id}"></td>
        <td th:text="${dish.name}"></td>
        <td th:text="${dish.price}"></td>

        <!-- Trạng thái -->
        <td th:if="${dish.available}" th:text="'Còn hàng'"></td>
        <td th:unless="${dish.available}" th:text="'Hết hàng'" style="color:red"></td>
    </tr>
</table>

</body>
</html>
